version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./cache:/app/cache
      - ./results:/app/results
    environment:
      - NCBI_API_KEY=${NCBI_API_KEY:-}
      - CACHE_DIR=cache
      - OUTPUT_DIR=results
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    restart: unless-stopped

  ui:
    build: .
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./cache:/app/cache
      - ./results:/app/results
    environment:
      - NCBI_API_KEY=${NCBI_API_KEY:-}
      - CACHE_DIR=cache
      - OUTPUT_DIR=results
    restart: unless-stopped
    depends_on:
      - api
